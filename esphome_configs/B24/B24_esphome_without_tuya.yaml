# Free GPIO inputs (without pull-up)
  - platform: gpio
    name: "b24-io13"
    pin:
      number: 13
      inverted: true
  - platform: gpio
    name: "b24-io14"
    pin:
      number: 14
      inverted: true
  - platform: gpio
    name: "b24-io21"
    pin:
      number: 21
      inverted: true

# Free GPIO inputs (with pull-up)
  - platform: gpio
    name: "b24-io7"
    pin:
      number: 7
      mode: INPUT_PULLUP
      inverted: true
  - platform: gpio
    name: "b24-io40"
    pin:
      number: 40
      mode: INPUT_PULLUP
      inverted: true
  - platform: gpio
