# ADS1115 ADC
ads1115:
  - address: 0x48
    i2c_id: bus_a

sensor:
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 6.144
    name: "B32M ADC A0"
    update_interval: 5s
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 6.144
    name: "B32M ADC A1"
    update_interval: 5s
  - platform: ads1115
    multiplexer: 'A2_GND'
    gain: 6.144
    name: "B32M ADC A2"
    update_interval: 5s
  - platform: ads1115
    multiplexer: 'A3_GND'
    gain: 6.144
    name: "B32M ADC A3"
    update_interval: 5s

# OLED Display
font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 16

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    i2c_id: bus_a
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(roboto), "KinCony B32M");
      it.printf(0, 20, id(roboto), "Inputs: 32");
      it.printf(0, 40, id(roboto), "Outputs: 32");

# Web Server
web_server:
  port: 80

# UART for RS485
uart:
  id: uart_1
  baud_rate: 9600
  tx_pin: GPIO39
  rx_pin: GPIO38
  debug:
    direction: BOTH
    dummy_receiver: true
