esphome:
  name: b32m
  friendly_name: B32M Controller

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Ethernet Configuration (W5500)
ethernet:
  type: W5500
  clk_pin: GPIO1
  mosi_pin: GPIO2
  miso_pin: GPIO41
  cs_pin: GPIO42
  interrupt_pin: GPIO43
  reset_pin: GPIO44
  manual_ip:
    static_ip: 192.168.1.100
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# I2C Bus Configuration
i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO18
    scan: true
    frequency: 400kHz

# PCF8575 I/O Expanders
pcf8574:
  # Input 1-16
  - id: 'pcf8574_hub_in_1'
    i2c_id: bus_a
    address: 0x22
    pcf8575: true
  # Input 17-24 & Output 1-8
  - id: 'pcf8574_hub_in_out_1'
    i2c_id: bus_a
    address: 0x25
    pcf8575: true
  # Output 9-24
  - id: 'pcf8574_hub_out_1'
    i2c_id: bus_a
    address: 0x24
    pcf8575: true
  # Input 25-32 & Output 25-32
  - id: 'pcf8574_hub_in_out_2'
    i2c_id: bus_a
    address: 0x26
    pcf8575: true

# 32 Binary Sensors (Inputs)
binary_sensor:
  # Inputs 1-16 (0x22)
  - platform: gpio
    name: "B32M Input 01"
    id: "b32m_input_01"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 0
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "B32M Input 02"
    id: "b32m_input_02"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 1
