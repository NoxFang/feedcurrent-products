esphome:
  name: n10
  friendly_name: n10

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  # baud_rate: 0

api:

ota:
  platform: esphome

ethernet:
  type: W5500
  clk_pin: GPIO42
  mosi_pin: GPIO43
  miso_pin: GPIO44
  cs_pin: GPIO41
  interrupt_pin: GPIO2
  reset_pin: GPIO1

uart:
  id: uart_modbus
  rx_pin: 9
  tx_pin: 10
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE

web_server:
  port: 80

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: ESP IP Address
      id: eth_ip
    dns_address:
      name: ESP DNS Address
    mac_address:
      name: ESP MAC Address

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 15

i2c:
  sda: 18
  scl: 17

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.printf(0, 15, id(roboto), "IP: %s", id(eth_ip).state.c_str());

modbus:
  id: mb1
  uart_id: uart_modbus

modbus_controller:
  - id: energy_meter
    modbus_id: mb1
    address: 1
    update_interval: 5s
    command_throttle: 200ms

sensor:
  # Protocol notes for this PR:
  # - current: U_DWORD_R, scaled by 0.001 A
  # - power:   S_DWORD_R, scaled by 0.1 W
  # - energy:  FP32_R, unit kWh
  # - voltage/frequency remain U_WORD * 0.01
  # - temperature remains FP32_R

  - platform: modbus_controller
    modbus_controller_id: energy_meter
    address: 100
    register_type: holding
    name: bl0910_1_current_1
    id: n10_1_current_1
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    value_type: U_DWORD_R
    filters:
      - multiply: 0.001

  - platform: modbus_controller
