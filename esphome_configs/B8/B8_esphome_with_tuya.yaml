  - platform: gpio
    name: "b8-W1-io47"
    pin: 
      number: 47
      inverted: true

  - platform: gpio
    name: "b8-W1-io48"
    pin: 
      number: 48
      inverted: true

  - platform: gpio
    name: "b8-W1-io7"
    pin: 
      number: 7
      inverted: true

  - platform: gpio
    name: "b8-W1-io40"
    pin: 
      number: 40
      inverted: true
## without resistance on PCB
  - platform: gpio
    name: "b8-13"
    pin: 
      number: 13
      inverted:  false
  - platform: gpio
    name: "b8-14"
    pin: 
      number: 14
